<!DOCTYPE html>
<html>
<head>
    <title>Toshokan - Pro</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
      
    <style>
        body { padding: 0; margin: 0; display: flex; }
        #map { height: 100vh; width: 100%; background-color: #333; flex-grow: 1; }

        /* --- GELİŞMİŞ SOL PANEL --- */
        #left-panel {
            position: absolute;
            top: 20px; left: 10px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-family: 'Segoe UI', sans-serif;
            width: 220px;
        }

        #search-box {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .progress-container {
            background: #eee;
            border-radius: 10px;
            margin: 10px 0;
            height: 10px;
            overflow: hidden;
        }
        #progress-bar {
            background: #27ae60;
            width: 0%;
            height: 100%;
            transition: width 0.3s;
        }

        /* Diğer stil kurallarını (popup vb.) koruyoruz */
        .custom-popup .leaflet-popup-content-wrapper { background: #f9f9f9; border-radius: 8px; }
        .custom-popup img { width: 100%; border-radius: 4px; }
        
        #button-container {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); z-index: 1000;
            background: white; padding: 10px; border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>

<div id="left-panel">
    <h4>Toshokan Kaşifi</h4>
    
    <div style="font-size: 12px; color: #666;">Keşif İlerlemesi: <span id="progress-text">0/0</span></div>
    <div class="progress-container"><div id="progress-bar"></div></div>

    <input type="text" id="search-box" placeholder="Konum ara..." onkeyup="searchMap()">

    <hr>
    
    <h4>Harita Modu</h4>
    <label><input type="radio" name="map-mode" value="kıta" checked> Kıta Haritası</label><br>
    <label><input type="radio" name="map-mode" value="tarih"> Toshokan Tarihi</label><br>
    <label><input type="radio" name="map-mode" value="aftzaak"> Aftzaak</label>
</div>

<div id="map"></div>

<div id="button-container">
    <button id="btn-prev">←</button>
    <button id="btn-next">→</button>
</div>

<script>
    // --- 1. VERİ YAPISI (Markers artık bir listede) ---
    // Bu liste sayesinde arama ve ilerleme takibi yapabiliyoruz
    const locationsData = [
        { id: 1, name: "HYDİAH TOPRAKLARI", mode: "kıta", coords: [1365, 458], desc: "Hydiah ırkından Istayu halkının yuvası...", img: "resimler/Hydiah.png" },
        { id: 2, name: "Sissiz Alan", mode: "kıta", coords: [1098, 659], desc: "Acıpelin Gizmeni felaketi sonrası...", img: "resimler/SAHarita.png" },
        { id: 3, name: "LOBİN BÖLGESİ", mode: "kıta", coords: [1558, 1650], desc: "İnsanın atası olan Lobino...", img: "resimler/Lobin.png" },
        { id: 4, name: "Aftzaanka Sarayı", mode: "aftzaak", coords: [521, 1405], desc: "Aftzaak'ın mevcut hükümdarları...", img: "resimler/Aftzaanka.png" }
    ];

    // --- 2. HARİTA AYARLARI (Senin orijinal ayarların) ---
    var kıtaBounds = [[0, 0], [2048, 2048]];
    var aftzaakBounds = [[0, 0], [2048, 1696]];
    
    var map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: -2,
        maxBounds: kıtaBounds,
        maxBoundsViscosity: 1.0
    });

    var currentActiveLayer = L.imageOverlay('resimler/Harita.webp', kıtaBounds).addTo(map);
    map.setView([1024, 1024], -1);

    var Isaret = L.icon({
        iconUrl: 'resimler/Isaret2.png',
        iconSize: [48, 48],
        iconAnchor: [24, 48]
    });

    // --- 3. MARKER OLUŞTURMA VE İLERLEME SİSTEMİ ---
    var activeMarkers = L.layerGroup().addTo(map);

    function renderMarkers(mode) {
        activeMarkers.clearLayers();
        const savedFound = JSON.parse(localStorage.getItem('toshokan_found') || '[]');
        
        const filtered = locationsData.filter(loc => loc.mode === mode);
        
        filtered.forEach(loc => {
            const isFound = savedFound.includes(loc.id);
            const m = L.marker(loc.coords, { 
                icon: Isaret,
                opacity: isFound ? 0.4 : 1.0 
            });

            const popupHtml = `
                <div class="custom-popup">
                    <h3>${loc.name}</h3>
                    <p>${loc.desc}</p>
                    <img src="${loc.img}">
                    <button onclick="markAsFound(${loc.id})" style="width:100%; margin-top:10px; cursor:pointer;">
                        ${isFound ? '✅ Keşfedildi' : '📍 Keşfettim Say'}
                    </button>
                </div>
            `;
            m.bindPopup(popupHtml);
            m.locId = loc.id;
            m.locName = loc.name.toLowerCase();
            activeMarkers.addLayer(m);
        });
        updateProgressUI();
    }

    function markAsFound(id) {
        let savedFound = JSON.parse(localStorage.getItem('toshokan_found') || '[]');
        if(!savedFound.includes(id)) {
            savedFound.push(id);
            localStorage.setItem('toshokan_found', JSON.stringify(savedFound));
            renderMarkers(document.querySelector('input[name="map-mode"]:checked').value);
        }
    }

    function updateProgressUI() {
        const savedFound = JSON.parse(localStorage.getItem('toshokan_found') || '[]');
        const total = locationsData.length;
        const found = savedFound.length;
        const percent = (found / total) * 100;
        
        document.getElementById('progress-bar').style.width = percent + "%";
        document.getElementById('progress-text').innerText = `${found}/${total}`;
    }

    // --- 4. ARAMA FONKSİYONU ---
    function searchMap() {
        const query = document.getElementById('search-box').value.toLowerCase();
        activeMarkers.eachLayer(marker => {
            if(marker.locName.includes(query) && query !== "") {
                map.flyTo(marker.getLatLng(), 0);
                marker.openPopup();
            }
        });
    }

    // --- 5. MOD DEĞİŞTİRME (Senin mantığınla birleştirildi) ---
    document.getElementById('left-panel').addEventListener('change', function(e) {
        if (e.target.name === 'map-mode') {
            const mode = e.target.value;
            renderMarkers(mode);
            
            // Burada senin switchMap ve switchToAftzaak fonksiyonlarını çağırabilirsin
            // Örnek basitleştirilmiş geçiş:
            if(mode === 'kıta') {
                map.setMaxBounds(kıtaBounds);
                // ... (Görsel değiştirme kodların)
            }
        }
    });

    // İlk açılışta markerları yükle
    renderMarkers('kıta');

</script>
</body>
</html>
