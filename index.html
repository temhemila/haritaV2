<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magus of the Library - Aftzaak Dünyası Arşivi</title>
    <link href="https://unpkg.com/maplibre-gl@4.7.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@4.7.0/dist/maplibre-gl.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Georgia&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; padding: 0; background-color: #1e1e24; font-family: 'Georgia', serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        .map-title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(28, 20, 14, 0.9);
            color: #f4eae1;
            padding: 12px 30px;
            border-radius: 30px;
            font-family: 'Cinzel', serif;
            font-size: 24px;
            letter-spacing: 2px;
            z-index: 10;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
            border: 2px solid #c5a059;
            pointer-events: none;
            text-align: center;
        }
        .map-subtitle { font-family: 'Georgia', serif; font-size: 13px; color: #c5a059; margin-top: 4px; letter-spacing: 1px; }

        .sidebar {
            position: absolute;
            top: 130px;
            left: 20px;
            width: 290px;
            bottom: 30px;
            background: rgba(251, 246, 238, 0.95);
            border: 2px solid #8c6d3b;
            border-radius: 12px;
            padding: 18px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            z-index: 10;
            overflow-y: auto;
            border-left: 6px solid #5c401b;
        }
        .sidebar-title {
            font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700; color: #4a3319;
            text-align: center; border-bottom: 2px dashed #8c6d3b; padding-bottom: 10px; margin-bottom: 15px; letter-spacing: 1px;
        }
        .index-item { padding: 12px 8px; border-bottom: 1px solid #e6dbcb; cursor: pointer; transition: all 0.3s ease; color: #5a4531; }
        .index-item:hover { background: #ebdcb9; padding-left: 15px; color: #8b0000; border-radius: 4px; }
        .index-item strong { font-family: 'Cinzel', serif; display: block; font-size: 13px; margin-bottom: 3px; color: #2b1a08; }
        .index-item p { margin: 0; font-size: 12px; line-height: 1.4; font-style: italic; }

        .maplibregl-popup-content {
            background: #fbf6ee !important; border: 2px solid #8c6d3b !important; border-radius: 8px !important;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4) !important; padding: 15px !important; color: #3d2b1f !important; max-width: 260px;
        }
        .maplibregl-popup-content h3 { font-family: 'Cinzel', serif; color: #8b2500; margin: 0 0 8px 0; font-size: 15px; border-bottom: 1px dashed #8c6d3b; padding-bottom: 5px; }
        .maplibregl-popup-content p { margin: 0; font-size: 13px; line-height: 1.5; }
        .maplibregl-popup-close-button { color: #8c6d3b !important; font-size: 16px !important; padding: 4px 8px !important; }
        .maplibregl-popup-tip { border-top-color: #8c6d3b !important; border-bottom-color: #8c6d3b !important; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="map-title">
        Aftzaak Dünyası Haritası
        <div class="map-subtitle">Büyük Kütüphane Amun Merkez Arşivi</div>
    </div>

    <div class="sidebar">
        <div class="sidebar-title">📜 Kafna Seyahat Endeksi</div>
        <div id="catalog-list"></div>
    </div>

    <script>
        // 📌 LOKASYON VERİ TABANI
        const locations = [
            { id: "amun", title: "Büyük Kütüphane Amun", desc: "Dünyanın tüm bilgisinin toplandığı, Kafnaların merkez üssü olan devasa kütüphane şehri.", coords: [0, 4.5], color: "#FFD700" },
            { id: "huwatan", title: "Huwatan Köyü", desc: "Theo'nun büyüdüğü, kitapların nadir bulunduğu ve Kafna Sedona ile ilk karşılaştığı küçük sınır köyü.", coords: [-25, -5.5], color: "#00FF00" },
            { id: "kizil_sehir", title: "Kızıl Şehir (Kizil)", desc: "Kadim çağlarda büyük kütüphane savaşlarının ve stratejik kırılmaların yaşandığı tarihi askeri bölge.", coords: [12, 10.5], color: "#FF0000" },
            { id: "kizil_dag", title: "Kızıl Dağ Sınırı", desc: "Mistik yaratıkların ve eski büyü kalıntılarının korunduğu, tekinsiz dağ silsilesi.", coords: [17, -9.5], color: "#FF4500" },
            { id: "golge_ormani", title: "Kadim Gölge Ormanları", desc: "Farklı kabilelerin ve dış dünyaya kapalı toplulukların koruduğu gizli el yazmalarına ev sahipliği yapan orman.", coords: [-15, -13.5], color: "#00FF7F" }
        ];

        // 📜 SOL MENÜYÜ ANINDA DOLDUR (Haritadan bağımsız çalışır, boş kalmayı önler)
        const catalogContainer = document.getElementById('catalog-list');
        const markersMap = {}; 

        locations.forEach(loc => {
            const indexItem = document.createElement('div');
            indexItem.className = 'index-item';
            indexItem.innerHTML = `<strong>${loc.title}</strong><p>${loc.desc.substring(0, 65)}...</p>`;
            
            indexItem.addEventListener('click', () => {
                if (window.mapReady && map) {
                    map.flyTo({ center: loc.coords, zoom: 4.5, essential: true, speed: 1.2 });
                    if (markersMap[loc.id]) markersMap[loc.id].togglePopup();
                }
            });
            catalogContainer.appendChild(indexItem);
        });

        // 🗺️ HARİTA MOTORUNU BAŞLAT
        const map = new maplibregl.Map({
            container: 'map',
            renderWorldCopies: false, 
            maxBounds: [[-170, -75], [170, 75]], 
            style: {
                version: 8,
                sources: {},
                layers: [
                    { id: 'background', type: 'background', paint: { 'background-color': '#1a1410' } }
                ]
            },
            center: [0, 0],
            zoom: 2.2
        });

        map.addControl(new maplibregl.NavigationControl(), 'top-right');
        window.mapReady = false;

        map.on('load', function () {
            window.mapReady = true;

            // 1️⃣ TABAN KATMAN: MANGA HARİTASI
            const imageURL = 'https://raw.githubusercontent.com/temhemila/haritaV2/refs/heads/main/resimler/sigma.webp';
            map.addSource('image-source', {
                type: 'image',
                url: imageURL,
                coordinates: [[-60, 31.39], [60, 31.39], [60, -31.39], [-60, -31.39]]
            });
            map.addLayer({
                id: 'image-layer',
                type: 'raster',
                source: 'image-source',
                paint: { 'raster-opacity': 0.95 }
            });

            // 2️⃣ İŞARETÇİLERİ VE POPUPLARI EKLE
            locations.forEach(loc => {
                const popup = new maplibregl.Popup({ offset: 25 }).setHTML(`<h3>${loc.title}</h3><p>${loc.desc}</p>`);
                const marker = new maplibregl.Marker({ color: loc.color }).setLngLat(loc.coords).setPopup(popup).addTo(map);
                markersMap[loc.id] = marker; 
            });

            // 3️⃣ YOĞUN SİS DUVARI MOTORU (Kusursuzlaştırılmış URL Altyapısı)
            const fogImage = new Image();
            fogImage.crossOrigin = "anonymous"; 
            // DÜZELTİLEN LINK: refs/heads/main yapısı eklendi, artık CORS engeline takılamaz!
            fogImage.src = 'https://raw.githubusercontent.com/temhemila/haritaV2/refs/heads/main/resimler/sis1.webp'; 

            fogImage.onload = function() {
                const canvas = document.createElement('canvas');
                canvas.width = 2400;  
                canvas.height = 1200;
                const ctx = canvas.getContext('2d');

                const cloudList = [];
                for (let x = 80; x < 1450; x += 130) {
                    for (let y = 100; y < 1050; y += 110) {
                        if (Math.random() > 0.15) {
                            cloudList.push({
                                x: x + (Math.random() - 0.5) * 90,
                                y: y + (Math.random() - 0.5) * 90,
                                scale: 0.35 + Math.random() * 0.35, 
                                seed: Math.random() * 100,
                                speedX: 0.3 + Math.random() * 0.4,
                                speedY: 0.2 + Math.random() * 0.4
                            });
                        }
                    }
                }

                map.addSource('dense-manga-fog-source', {
                    type: 'canvas',
                    canvas: canvas,
                    coordinates: [[-63, 32], [63, 32], [63, -32], [-63, -32]], 
                    animate: true
                });

                map.addLayer({
                    id: 'dense-manga-fog-layer',
                    type: 'raster',
                    source: 'dense-manga-fog-source',
                    paint: {
                        'raster-opacity': 0.88, 
                        'raster-fade-duration': 0
                    }
                });

                let startTime = Date.now();

                function renderDenseFog() {
                    if (!map.getLayer('dense-manga-fog-layer')) return; 
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const elapsed = (Date.now() - startTime) / 1000;

                    cloudList.forEach(c => {
                        const xDrift = Math.sin(elapsed * c.speedX + c.seed) * 12;
                        const yDrift = Math.cos(elapsed * c.speedY + c.seed) * 8;
                        ctx.globalAlpha = 0.82 + Math.sin(elapsed * 0.5 + c.seed) * 0.12;

                        const finalWidth = fogImage.width * c.scale;
                        const finalHeight = fogImage.height * c.scale;

                        ctx.drawImage(fogImage, c.x + xDrift, c.y + yDrift, finalWidth, finalHeight);
                    });

                    requestAnimationFrame(renderDenseFog);
                }

                renderDenseFog();
            };

            // Güvenlik önlemi: Ola ki bir gün internet yavaşlar veya resim silinirse harita donmasın
            fogImage.onerror = function() {
                console.log("Sis yüklenemedi ama harita ve menü güvenli modda çalışıyor.");
            };
        });
    </script>
</body>
</html>
