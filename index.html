<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fantastik Dünya Haritası</title>
    <link href="https://unpkg.com/maplibre-gl@4.7.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@4.7.0/dist/maplibre-gl.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #1e1e24; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .map-title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-family: 'Georgia', serif;
            font-size: 24px;
            letter-spacing: 2px;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #ffd700;
            pointer-events: none;
        }
        .map-subtitle {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #ddd;
            font-family: 'Georgia', serif;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 6px 16px;
            border-radius: 20px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="map-title">Kizil Diyar'in Haritasi</div>
    <div class="map-subtitle">Ejderhalarin, Elflerin ve Kralliklarin Diyari</div>

    <script>
        const map = new maplibregl.Map({
            container: 'map',
            renderWorldCopies: false, 
            // Güvenli harita sınırları (Çökmeyi engeller ama kamerayı çok uzaklara kaydırmana izin verir)
            maxBounds: [[-170, -75], [170, 75]], 
            style: {
                version: 8,
                sources: {},
                layers: [
                    {
                        id: 'background',
                        type: 'background',
                        paint: { 'background-color': '#1e1e24' } 
                    }
                ]
            },
            center: [0, 0],
            zoom: 3 // Resim odaklı olduğu için başlangıç zoomunu biraz artırdık
        });

        map.addControl(new maplibregl.NavigationControl(), 'top-right');
        map.addControl(new maplibregl.ScaleControl(), 'bottom-left');

        map.on('load', function () {
            const imageURL = 'https://raw.githubusercontent.com/temhemila/haritaV2/refs/heads/main/resimler/sigma.webp';

            map.addSource('image-source', {
                type: 'image',
                url: imageURL,
                // Resmin en-boy oranını (2752x1536) sıfır bozulmayla koruyan yeni düz koordinatlar
                coordinates: [
                    [-60, 31.39],  // Sol Üst
                    [60, 31.39],   // Sağ Üst
                    [60, -31.39],  // Sağ Alt
                    [-60, -31.39]  // Sol Alt
                ]
            });

            map.addLayer({
                id: 'image-layer',
                type: 'raster',
                source: 'image-source',
                paint: {
                    'raster-opacity': 0.95
                }
            });

            // İŞARETÇİLER (Yeni koordinat sistemine göre milimetrik olarak yeniden konumlandırıldı)
            new maplibregl.Marker({ color: '#FF0000' })
                .setLngLat([10, 13.38])
                .setPopup(new maplibregl.Popup().setHTML("<h3>Kizil Sehir</h3><p>Burada buyuk bir savas oldu.</p>"))
                .addTo(map);

            new maplibregl.Marker({ color: '#00FF00' })
                .setLngLat([-6.66, -4.46])
                .setPopup(new maplibregl.Popup().setHTML("<h3>Zumrut Ormani</h3><p>Elflerin kralligi.</p>"))
                .addTo(map);

            new maplibregl.Marker({ color: '#FFD700' })
                .setLngLat([-3.33, 20.07])
                .setPopup(new maplibregl.Popup().setHTML("<h3>Altin Taht</h3><p>Kuzey Kralligi'nin baskenti.</p>"))
                .addTo(map);

            new maplibregl.Marker({ color: '#FF4500' })
                .setLngLat([16.66, -8.92])
                .setPopup(new maplibregl.Popup().setHTML("<h3>Kizil Dag</h3><p>Burada yasli bir ejderha uyuyor.</p>"))
                .addTo(map);

            new maplibregl.Marker({ color: '#00FF7F' })
                .setLngLat([-13.33, -13.38])
                .setPopup(new maplibregl.Popup().setHTML("<h3>Golge Ormani</h3><p>Elflerin gizli kralligi.</p>"))
                .addTo(map);

            // KRALLIK SINIRI (Yeni koordinat sistemine göre oranlandı)
            map.addSource('krallik-sinir', {
                type: 'geojson',
                data: {
                    type: 'Feature',
                    geometry: {
                        type: 'Polygon',
                        coordinates: [[
                            [3.33, 13.38],
                            [6.66, 15.61],
                            [10, 11.15],
                            [8.33, 6.69],
                            [3.33, 8.92],
                            [3.33, 13.38]
                        ]]
                    }
                }
            });

            map.addLayer({
                id: 'krallik-sinir-cizgi',
                type: 'line',
                source: 'krallik-sinir',
                paint: {
                    'line-color': '#FFD700',
                    'line-width': 4,
                    'line-dasharray': [3, 3]
                }
            });

            map.addLayer({
                id: 'krallik-dolgu',
                type: 'fill',
                source: 'krallik-sinir',
                paint: {
                    'fill-color': '#FFD700',
                    'fill-opacity': 0.15
                }
            });
        });
    </script>
</body>
</html>
