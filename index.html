<!DOCTYPE html>
<html>
<head>
    <title>Toshokan - Arcane Edition</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.js"></script>
      
    <style>
        /* --- ARKAN RENK PALETİ VE DEĞİŞKENLER --- */
        :root {
            --bg-glass: rgba(15, 18, 26, 0.82);
            --border-amber: rgba(212, 175, 55, 0.35);
            --border-amber-glow: rgba(212, 175, 55, 0.7);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --gold: #d4af37;
            --font-title: 'Cinzel', serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            padding: 0;
            margin: 0;
            overflow: hidden;
            font-family: var(--font-body);
            background-color: #0d0f14;
        }
        
        #map { 
            height: 100vh; 
            width: 100%; 
            background-color: #0d0f14;
        }

        /* --- ORTAK PANEL STİLLERİ (GLASSMORPHISM) --- */
        .arcane-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-amber);
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(212, 175, 55, 0.05);
            color: var(--text-primary);
            padding: 18px;
            z-index: 1000;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .arcane-panel h4 {
            font-family: var(--font-title);
            color: var(--gold);
            margin-top: 0;
            margin-bottom: 12px;
            letter-spacing: 1px;
            font-size: 15px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-amber);
            padding-bottom: 6px;
        }

        /* --- SOL PANEL (HARİTA MODU) --- */
        #left-panel {
            position: absolute;
            top: 25px; 
            left: 25px;
            width: 220px;
        }

        /* Segmented Kontrol Seçenekleri */
        .mode-selector {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .mode-selector label {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .mode-selector label:hover {
            background: rgba(212, 175, 55, 0.08);
            border-color: rgba(212, 175, 55, 0.2);
        }
        .mode-selector input[type="radio"] {
            display: none; /* Standart yuvarlağı gizle */
        }
        .mode-selector label:has(input:checked) {
            background: rgba(212, 175, 55, 0.15);
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
            color: #fff;
        }

        /* --- SAĞ PANEL (KATMAN KONTROLÜ) --- */
        #right-panel {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 180px;
            display: none;
        }
        .layer-selector {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .layer-selector label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            cursor: pointer;
            padding: 4px 0;
        }
        .layer-selector input[type="checkbox"] {
            accent-color: var(--gold);
            width: 15px;
            height: 15px;
            cursor: pointer;
        }

        /* --- HARİTA BİLGİ KUTUSU (SAĞ ALT) --- */
        #map-info {
            position: absolute;
            bottom: 25px;
            right: 25px; 
            max-width: 320px;
            display: none;
        }
        #map-info p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 13.5px;
            line-height: 1.5;
        }

        /* --- TOSHOKAN TARİHİ BUTONLARI (ALT ORTA) --- */
        #button-container {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            background: var(--bg-glass);
            border: 1px solid var(--border-amber);
            padding: 6px;
            border-radius: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }
        #button-container button {
            background: transparent;
            border: none;
            color: var(--text-primary);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        #button-container button:hover {
            background: rgba(212, 175, 55, 0.2);
            color: var(--gold);
        }
        #button-container button svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* --- ÖZEL POPUP VE MARKER TASARIMLARI --- */
        .custom-marker {
            width: 42px;
            height: 42px;
            background-image: url('resimler/Isaret2.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.5));
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .custom-marker:hover {
            transform: scale(1.15);
        }

        .custom-popup .maplibregl-popup-content {
            background: #11141d;
            border: 1px solid var(--border-amber);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            padding: 16px;
            width: 260px;
            font-family: var(--font-body);
            color: var(--text-primary);
        }
        .custom-popup .maplibregl-popup-tip {
            border-top-color: var(--border-amber) !important;
            border-bottom-color: var(--border-amber) !important;
        }
        .custom-popup h3 {
            font-family: var(--font-title);
            margin-top: 0;
            margin-bottom: 8px;
            color: var(--gold);
            font-size: 15px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
            padding-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .custom-popup p {
            margin: 6px 0 12px 0;
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.45;
        }
        .custom-popup a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
        }
        .custom-popup a:hover { text-decoration: underline; }
        .custom-popup img {
            width: 100%;
            height: auto;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 4px;
        }
        .maplibregl-popup-close-button {
            color: var(--text-secondary);
            padding: 6px 10px;
            font-size: 16px;
        }
        .maplibregl-popup-close-button:hover { color: #fff; background: transparent; }

        /* --- MOBİL UYUMLULUK --- */
        @media (max-width: 768px) {
            #left-panel {
                top: 15px; left: 15px; right: 15px;
                width: calc(100% - 66px);
                padding: 12px;
            }
            .mode-selector { flex-direction: row; gap: 4px; }
            .mode-selector label { flex: 1; justify-content: center; padding: 8px 4px; font-size: 11px; }
            #left-panel h4 { display: none; } /* Mobilde başlığı gizle yer açılsın */

            #right-panel {
                top: auto; bottom: 85px; left: 15px; right: 15px;
                width: calc(100% - 66px);
                padding: 12px;
            }
            .layer-selector { flex-direction: row; justify-content: space-around; }

            #button-container { bottom: 15px; width: 120px; }

            #map-info {
                bottom: 145px; left: 15px; right: 15px;
                max-width: none;
                padding: 12px;
            }
            #map-info h4 { font-size: 13px; }
            #map-info p { font-size: 12px; }

            .custom-popup .maplibregl-popup-content { max-width: 70vw; }
        }
    </style>
</head>
<body>

<div id="map"></div>

<div id="left-panel" class="arcane-panel">
    <h4>Harita Arşivi</h4>
    <div class="mode-selector">
        <label>
            <input type="radio" name="map-mode" value="kıta" checked> Kıta Haritası
        </label>
        <label>
            <input type="radio" name="map-mode" value="tarih"> Tarih Kayıtları
        </label>
        <label>
            <input type="radio" name="map-mode" value="aftzaak"> Aftzaak Şehri
        </label>
    </div>
</div>

<div id="right-panel" class="arcane-panel"></div>

<div id="map-info" class="arcane-panel">
    <h4 id="info-title">Harita Açıklaması</h4>
    <p id="info-text">Aktif harita ile ilgili açıklamalar burada görüntülenecektir.</p>
</div>

<div id="button-container">
    <button id="btn-prev" title="Önceki Çağ">
        <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
    </button>
    <button id="btn-next" title="Sonraki Çağ">
        <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
    </button>
</div>

<script>
    // --- TEMEL VERİLER VE KOORDİNAT SİSTEMİ ---
    var SCALE = 0.05; 
    var kıtaWidth = 2048, kıtaHeight = 2048;
    var aftzaakWidth = 1696, aftzaakHeight = 2048;
    
    var tarihDimensions = [
        [0, 0], 
        [1538, 1398], [1848, 1350], [1746, 1204], [1986, 1166], [1710, 1404],
        [1652, 1426], [1342, 1456], [1358, 1458], [1200, 1163], [1542, 1602],
        [1528, 1390], [1804, 1410], [1592, 1560], [1556, 1554], [1664, 1636]
    ];

    function generateCoordinates(w, h) {
        return [[0, h * SCALE], [w * SCALE, h * SCALE], [w * SCALE, 0], [0, 0]];
    }

    function toLngLat(leafletCoords) {
        return [leafletCoords[1] * SCALE, leafletCoords[0] * SCALE];
    }

    // MapLibre Motorunu Kurma
    var map = new maplibregl.Map({
        container: 'map',
        style: {
            version: 8,
            sources: {},
            layers: [{ id: 'background', type: 'background', paint: { 'background-color': '#0d0f14' } }]
        },
        dragRotate: false,
        pitchWithRotate: false
    });

    var mapImages = [
        'resimler/Harita.webp', 'resimler/THarita1.webp', 'resimler/THarita2.webp',
        'resimler/THarita3.webp', 'resimler/THarita4.webp', 'resimler/THarita5.webp',
        'resimler/THarita6.webp', 'resimler/THarita7.webp', 'resimler/THarita8.webp',
        'resimler/THarita9.webp', 'resimler/THarita10.webp', 'resimler/THarita11.webp',
        'resimler/THarita12.webp', 'resimler/THarita13.webp', 'resimler/THarita14.webp',
        'resimler/THarita15.webp'
    ];
    
    var mapDescriptions = [
        "Standart coğrafya haritası. Bu, dünyanın günümüzdeki genel görünümüdür.",
        "Hikâyenin geçtiği yer, dumanlar içindeki bu dünyadır. Büyüklüğü yaklaşık Almanya kadardır.",
        "Hikâyenin geçtiği yerin batısında, Tana soyunun (büyük kulak memeli halk) yurdu bulunur. Burada kıtanın altın çağını kurmuşlardır.",
        "Şu anda tamamen dumanın altında kalmış durumdadır.",
        "Hikâyenin geçtiği yerin kuzeyinde Omeka soyunun (boynuzlu halk) yurdu bulunur. Bir zamanlar burada, kıta tarihinin en geniş topraklarına sahip olan Maskeli İmparatorluk hüküm sürmüştür.",
        "Günümüzde (bu bölge) genel olarak ince bir duman tabakasıyla kaplıdır.",
        "Görkemli (en parlak) dönemlerindeki toprakları / en geniş sınırları.",
        "Kıtanın büyük bir bölümünü kaplayan Büyük Çöl'dür. Yaşamın kuruduğu bu toprakların, kadim Ejderha Savaşı'nın son muharebesine sahne olduğu sölenir. Sol kenardaki büyük nehrin yakınında Istayub soyu (esmer tenli halk) bir medeniyet kurmuştur.",
        "Günümüzde hâlâ görece güvende!",
        "Kıtayı boydan boya geçen büyük nehrin, bir zamanlar ayrı olan kara parçalarının tektonik hareketlerle birleştiği yerdeki 'dikiş izi' olabileceği söylenmektedir.",
        "Hikâyenin geçtiği yerin güneydoğusundaki subtropikal bölgede Hopi soyunun (uzun kulaklı halk) yurdu bulunur. Bu topraklarda, kanunnamelerle yönetilen en eski krallık kurulmuştur.",
        "Hikâyenin geçtiği yerin güneyinde Kayuga soyunun (üst kulaklı halk) yurdu bulunur. Bu bölgede birçok halk, Gnaan adındaki efsanevi topraklar için savaşmaya devam ediyordu.",
        "Gnaan'ın bu civarda bir yerde olduğu söylenir. Gerçekten var olup olmadığını bilmiyorum.",
        "Hikâyenin geçtiği yerin doğusundaki kanyon bölgesinde Kokopa soyunun (kanatlı halk) yurdu bulunur. Bu bölgenin coğrafyası o kadar çetindir ki, kanatları olmayan halkların burada yaşaması mümkün değildir.",
        "Hikâyenin geçtiği yerin çok doğusunda tropik bir bölge bulunur. Burada, medeniyet kurmamış birçok azınlık halk, avcılık merkezli bir yaşam sürmekteydi. Büyük Çöl'ü geçmek zor olduğundan, denizci halklar dışında kimseyle bir etkileşimleri olmamış gibi görünüyor.",
        "Görünüşe göre duman felaketinden pek etkilenmemiş. Dumanla çevrelenmelerinin üzerinden 100 yıl geçti; acaba yeni ülkeler mi doğdu, yoksa hiçbir şey değişmedi mi...?"
    ];
    
    var currentTarihIndex = 1;
    var currentMode = 'kıta';

    var contentKıta = [
        { c: "<h3>HYDİAH TOPRAKLARI</h3><p>Hydiah ırkından Istayu halkının yuvası olan bu bölge... <a href='...'>Devamı</a></p><img src='resimler/Hydiah.png'>", p: [1365, 458] },
        { c: "<h3>Sissiz Alan</h3><p>Acıpelin Gizmeni felaketi sonrası geriye kalan yaşanabilir bölge, boyutu günümüz Almanyası kadardır.</p><img src='resimler/SAHarita.png'>", p: [1098, 659] },
        { c: "<h3>LOBİN BÖLGESİ</h3><p>İnsanın atası olan Lobino kemir-genine ev sahipliği yapar. Tektonik... <a href='...'>Devamı</a></p><img src='resimler/Lobin.png'>", p: [1558, 1650] },
        { c: "<h3>SIRAKADİ BÖLGESİ</h3><p>Syrrana Savaşı'ndan geride kalmış bir savaş alanının kalıntıla- <a href='...'>Devamı</a></p><img src='resimler/Yokt.png'>", p: [1198, 1019] },
        { c: "<h3>KARASİNAEK BÖLGESİ</h3><p>Sivri kulaklı Haupi halkının yuvası olan bu bölge... <a href='...'>Devamı</a></p><img src='resimler/Kansinaek.png'>", p: [791, 1077] }
    ];

    var contentAftzaak = [
        { c: "<h3>Aftzaanka Sarayı</h3><p>Aftzaak'ın mevcut hükümdarları olan... <a href='#'>Devamı</a></p><img src='resimler/Aftzaanka.png'>", p: [521, 1405] },
        { c: "<h3>TOHNE ENSTİTÜSÜ İKİNCİ KAMPÜSÜ</h3><p>Şehirdeki en seçkin alimlerin görev yaptığı... <a href='#'>Devamı</a></p><img src='resimler/Tohne.png'>", p: [696, 299] }
    ];

    var kıtaMarkers = [], aftzaakMarkers = [];

    function createMaplibreMarker(info) {
        var el = document.createElement('div');
        el.className = 'custom-marker';
        var popup = new maplibregl.Popup({ offset: [0, -20], className: 'custom-popup', maxWidth: 'none' }).setHTML(info.c);
        return new maplibregl.Marker({ element: el }).setLngLat(toLngLat(info.p)).setPopup(popup);
    }

    map.on('load', function () {
        map.addSource('main-map-source', { type: 'image', url: mapImages[0], coordinates: generateCoordinates(kıtaWidth, kıtaHeight) });
        map.addLayer({ id: 'main-map-layer', type: 'raster', source: 'main-map-source' });

        map.addSource('aftzaak-source', { type: 'image', url: 'resimler/KSehri.png', coordinates: generateCoordinates(aftzaakWidth, aftzaakHeight) });
        map.addLayer({ id: 'aftzaak-layer', type: 'raster', source: 'aftzaak-source', layout: { visibility: 'none' } });

        map.addSource('sis-source', { type: 'image', url: 'resimler/Bulutlar.webp', coordinates: generateCoordinates(kıtaWidth, kıtaHeight) });
        map.addLayer({ id: 'sis-layer', type: 'raster', source: 'sis-source', layout: { visibility: 'none' }, paint: { 'raster-opacity': 0.75 } });

        contentKıta.forEach(function(info) { kıtaMarkers.push(createMaplibreMarker(info)); });
        contentAftzaak.forEach(function(info) { aftzaakMarkers.push(createMaplibreMarker(info)); });

        initializeMapState();
    });

    function setMapBounds(w, h) {
        var maxBounds = [[0, 0], [w * SCALE, h * SCALE]];
        map.setMaxBounds(maxBounds);
        map.fitBounds(maxBounds, { padding: 40, duration: 800 });
    }

    function switchMap(index) {
        var w, h;
        if (index === 0) {
            w = kıtaWidth; h = kıtaHeight;
            document.getElementById('info-title').textContent = "Ana Harita";
            document.getElementById('info-text').textContent = mapDescriptions[0];
        } else {
            w = tarihDimensions[index][1]; h = tarihDimensions[index][0];
            document.getElementById('info-text').textContent = mapDescriptions[index];
            currentTarihIndex = index;
        }

        map.getSource('main-map-source').updateImage({ url: mapImages[index], coordinates: generateCoordinates(w, h) });
        map.setLayoutProperty('main-map-layer', 'visibility', 'visible');
        map.setLayoutProperty('aftzaak-layer', 'visibility', 'none');
        setMapBounds(w, h);
    }

    function switchToAftzaak() {
        map.setLayoutProperty('main-map-layer', 'visibility', 'none');
        map.setLayoutProperty('aftzaak-layer', 'visibility', 'visible');
        setMapBounds(aftzaakWidth, aftzaakHeight);
    }

    function clearAllOverlays() {
        kıtaMarkers.forEach(m => m.remove());
        aftzaakMarkers.forEach(m => m.remove());
        map.setLayoutProperty('sis-layer', 'visibility', 'none');
    }

    function updateLayerControl(mode) {
        var rightPanel = document.getElementById('right-panel');
        rightPanel.innerHTML = '';
        
        if (mode === 'kıta') {
            rightPanel.style.display = 'block';
            rightPanel.innerHTML = `
                <h4>Katmanlar</h4>
                <div class="layer-selector">
                    <label><input type="checkbox" id="chk-locations" checked> Noktalar</label>
                    <label><input type="checkbox" id="chk-sis"> Sisi Aktif Et</label>
                </div>
            `;
            document.getElementById('chk-locations').addEventListener('change', function(e) {
                kıtaMarkers.forEach(m => e.target.checked ? m.addTo(map) : m.remove());
            });
            document.getElementById('chk-sis').addEventListener('change', function(e) {
                map.setLayoutProperty('sis-layer', 'visibility', e.target.checked ? 'visible' : 'none');
            });
        } else if (mode === 'aftzaak') {
            rightPanel.style.display = 'block';
            rightPanel.innerHTML = `
                <h4>Katmanlar</h4>
                <div class="layer-selector">
                    <label><input type="checkbox" id="chk-aft-locations" checked> Konumlar</label>
                </div>
            `;
            document.getElementById('chk-aft-locations').addEventListener('change', function(e) {
                aftzaakMarkers.forEach(m => e.target.checked ? m.addTo(map) : m.remove());
            });
        } else {
            rightPanel.style.display = 'none';
        }
    }

    document.getElementById('left-panel').addEventListener('change', function(e) {
        if (e.target.name === 'map-mode') {
            clearAllOverlays();
            currentMode = e.target.value;
            updateLayerControl(currentMode);
            
            var btnContainer = document.getElementById('button-container');
            var infoContainer = document.getElementById('map-info');
            var infoTitle = document.getElementById('info-title');

            switch (currentMode) {
                case 'kıta':
                    switchMap(0);
                    btnContainer.style.display = 'none';
                    infoContainer.style.display = 'none';
                    infoTitle.style.display = 'block';
                    kıtaMarkers.forEach(m => m.addTo(map));
                    break;
                case 'tarih':
                    switchMap(1);
                    btnContainer.style.display = 'inline-flex';
                    infoContainer.style.display = 'block';
                    infoTitle.style.display = 'none';
                    break;
                case 'aftzaak':
                    switchToAftzaak();
                    btnContainer.style.display = 'none';
                    infoContainer.style.display = 'none';
                    infoTitle.style.display = 'block';
                    aftzaakMarkers.forEach(m => m.addTo(map));
                    break;
            }
        }
    });

    document.getElementById('button-container').addEventListener('click', function(e) {
        var btn = e.target.closest('button');
        if (!btn) return;
        if (btn.id === 'btn-prev') {
            var newIndex = currentTarihIndex - 1;
            if (newIndex < 1) newIndex = 15;
            switchMap(newIndex);
        }
        if (btn.id === 'btn-next') {
            var newIndex = currentTarihIndex + 1;
            if (newIndex > 15) newIndex = 1;
            switchMap(newIndex);
        }
    });

    function initializeMapState() {
        updateLayerControl('kıta');
        switchMap(0);
        kıtaMarkers.forEach(m => m.addTo(map));
    }
</script>

</body>
</html>
